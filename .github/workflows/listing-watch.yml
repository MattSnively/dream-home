# Dream Home — Briarcliff West listing watcher
#
# Runs scripts/check_listings.py on a daily schedule (and on demand). The script
# queries RentCast for active Briarcliff West listings, diffs against the
# committed snapshot, emails Matt on anything new, and writes the snapshot back.
#
# Required repo secrets (Settings -> Secrets and variables -> Actions):
#   RENTCAST_API_KEY     - from rentcast.io (Developer / free tier)
#   GMAIL_ADDRESS        - sender Gmail address
#   GMAIL_APP_PASSWORD   - Gmail App Password (needs 2-Step Verification on)
# Optional (Phase 2 — auto-append new listings to the Sheet):
#   SHEET_WEBHOOK_URL    - Apps Script web-app URL
#   SHEET_WEBHOOK_TOKEN  - shared secret guarding that endpoint

name: Briarcliff West listing watch

on:
  # 13:00 UTC daily ≈ 8:00am CDT / 7:00am CST. One RentCast call per run keeps us
  # well under the free tier's 50-requests-per-month cap. The script emails only
  # on new listings, except on Fridays when it sends a full weekly summary.
  schedule:
    - cron: "0 13 * * *"
  # Allow manual runs from the Actions tab. force_summary sends the weekly
  # summary immediately (for testing the format any day).
  workflow_dispatch:
    inputs:
      force_summary:
        description: "Send the weekly summary now (test)"
        type: boolean
        default: false

# The final step commits the refreshed snapshot back to the repo, so the job
# needs write access to repository contents.
permissions:
  contents: write

jobs:
  watch:
    name: Check for new listings
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # The script is standard-library only, so there is nothing to pip install.
      - name: Run listing watcher
        env:
          RENTCAST_API_KEY:    ${{ secrets.RENTCAST_API_KEY }}
          GMAIL_ADDRESS:       ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASSWORD:  ${{ secrets.GMAIL_APP_PASSWORD }}
          SHEET_WEBHOOK_URL:   ${{ secrets.SHEET_WEBHOOK_URL }}
          SHEET_WEBHOOK_TOKEN: ${{ secrets.SHEET_WEBHOOK_TOKEN }}
        run: |
          ARGS=""
          if [ "${{ inputs.force_summary }}" = "true" ]; then ARGS="--force-email"; fi
          python scripts/check_listings.py $ARGS

      # Commit the updated snapshot only when it actually changed. The
      # "[skip ci]" tag plus deploy.yml's paths-ignore prevents a pointless
      # Pages rebuild from this data-only commit.
      - name: Commit updated snapshot
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/briarcliff-west-listings.json
          if git diff --cached --quiet; then
            echo "No snapshot changes to commit."
          else
            git commit -m "Update Briarcliff West listing snapshot [skip ci]"
            git push
          fi
